services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      MARIADB_HOST: db
      MARIADB_PORT: ${MARIADB_PORT:-3306}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-ledger}
      MARIADB_USER: ${MARIADB_USER:-ledger}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-me}
      APP_LOG_DIR: ${APP_LOG_DIR:-/data/log/app}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-*12344321*}
    volumes:
      - ./backend:/app
      - /data/log/app:/data/log/app
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      - backend

  db:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-ledger}
      MARIADB_USER: ${MARIADB_USER:-ledger}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-me}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-root-password}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "${MARIADB_HOST_PORT:-3306}:3306"

volumes:
  frontend_node_modules:
  mariadb_data:
